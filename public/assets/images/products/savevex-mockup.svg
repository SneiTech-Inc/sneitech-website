    <rect x="280" y="60" width="220" height="80" rx="12" fill="oklch(0.2 0.02 250)" stroke="oklch(0.3 0.02 250)" stroke-width="1"/>
    <text x="390" y="106" text-anchor="middle" font-family="Geist, system-ui" font-size="16" font-weight="600" fill="white">Image Tools</text>

    <rect x="520" y="60" width="220" height="80" rx="12" fill="oklch(0.2 0.02 250)" stroke="oklch(0.3 0.02 250)" stroke-width="1"/>
    <text x="630" y="106" text-anchor="middle" font-family="Geist, system-ui" font-size="16" font-weight="600" fill="white">Video Tools</text>

    <rect x="40" y="160" width="220" height="80" rx="12" fill="oklch(0.2 0.02 250)" stroke="oklch(0.3 0.02 250)" stroke-width="1"/>
    <text x="150" y="206" text-anchor="middle" font-family="Geist, system-ui" font-size="16" font-weight="600" fill="white">Audio Tools</text>

    <rect x="280" y="160" width="220" height="80" rx="12" fill="oklch(0.2 0.02 250)" stroke="oklch(0.3 0.02 250)" stroke-width="1"/>
    <text x="390" y="206" text-anchor="middle" font-family="Geist, system-ui" font-size="16" font-weight="600" fill="white">Document Tools</text>

    <rect x="520" y="160" width="220" height="80" rx="12" fill="oklch(0.2 0.02 250)" stroke="oklch(0.3 0.02 250)" stroke-width="1"/>
    <text x="630" y="206" text-anchor="middle" font-family="Geist, system-ui" font-size="16" font-weight="600" fill="white">Utility Tools</text>
