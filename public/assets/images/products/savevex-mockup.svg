<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="oklch(0.15 0.02 250)"/>
      <stop offset="100%" stop-color="oklch(0.12 0.03 250)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="20" fill="url(#bg2)" stroke="oklch(0.25 0.02 250)" stroke-width="2"/>
