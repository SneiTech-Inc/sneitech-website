<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="oklch(0.15 0.02 250)"/>
      <stop offset="100%" stop-color="oklch(0.12 0.03 250)"/>
    </linearGradient>
  </defs>
  <rect width="400" height="800" rx="24" fill="url(#bg)" stroke="oklch(0.25 0.02 250)" stroke-width="2"/>
  <!-- Phone notch -->
  <rect x="140" y="16" width="120" height="28" rx="14" fill="oklch(0.1 0.015 250)"/>
  <!-- Score card mockup -->
  <rect x="40" y="80" width="320" height="140" rx="16" fill="oklch(0.2 0.02 250)" stroke="oklch(0.3 0.02 250)" stroke-width="1"/>
  <rect x="60" y="100" width="120" height="16" rx="4" fill="oklch(0.65 0.25 250)" opacity="0.8"/>
  <rect x="60" y="130" width="80" height="12" rx="3" fill="oklch(0.65 0.01 250)" opacity="0.4"/>
  <text x="340" y="160" text-anchor="middle" font-family="Geist, system-ui" font-size="32" font-weight="700" fill="white">2 - 1</text>
  <!-- Feed items -->
  <rect x="40" y="250" width="320" height="80" rx="12" fill="oklch(0.2 0.02 250)" stroke="oklch(0.3 0.02 250)" stroke-width="1"/>
  <rect x="40" y="350" width="320" height="80" rx="12" fill="oklch(0.2 0.02 250)" stroke="oklch(0.3 0.02 250)" stroke-width="1"/>
  <rect x="40" y="450" width="320" height="80" rx="12" fill="oklch(0.2 0.02 250)" stroke="oklch(0.3 0.02 250)" stroke-width="1"/>
  <!-- Label -->
  <text x="200" y="600" text-anchor="middle" font-family="Geist, system-ui" font-size="18" font-weight="600" fill="oklch(0.65 0.25 250)">Sporvex Mockup</text>
  <text x="200" y="630" text-anchor="middle" font-family="Geist, system-ui" font-size="14" fill="oklch(0.65 0.01 250)">Live scores feed preview</text>
  <text x="200" y="660" text-anchor="middle" font-family="Geist, system-ui" font-size="12" fill="oklch(0.5 0.01 250)">Replace with actual screenshot</text>
</svg>
